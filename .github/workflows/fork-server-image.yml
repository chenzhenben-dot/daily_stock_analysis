name: Fork Server Image

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref or commit to package
        required: true
        default: main
        type: string
      image_tag:
        description: GHCR image tag
        required: true
        default: server-latest
        type: string

concurrency:
  group: fork-server-image-${{ inputs.image_tag }}
  cancel-in-progress: true

jobs:
  build-smoke-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out requested source
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build complete amd64 server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          load: true
          tags: dsa-fork-server:smoke
          cache-from: type=gha,scope=fork-server-amd64
          cache-to: type=gha,mode=max,scope=fork-server-amd64

      - name: Run image import smoke
        run: |
          docker run --rm dsa-fork-server:smoke python -c "
          from src.config import get_config; print('ok-config')
          from src.storage import DatabaseManager; print('ok-storage')
          from src.notification import NotificationService; print('ok-notification')
          from data_provider import DataFetcherManager; print('ok-data-provider')
          from src.analyzer import GeminiAnalyzer; print('ok-analyzer')
          from src.llm.response_content import strip_leading_think_wrapper; print('ok-response-content')
          print('fork-server-image-smoke-ok')
          "

      - name: Push immutable server image
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}
        run: |
          docker tag dsa-fork-server:smoke "$IMAGE"
          docker push "$IMAGE"
          echo "### Server image published" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`$IMAGE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: \`${{ inputs.source_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
