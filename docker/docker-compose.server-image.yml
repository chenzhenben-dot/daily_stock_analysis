name: daily-stock-analysis

x-common: &common
  image: ${DSA_IMAGE:-ghcr.io/chenzhenben-dot/daily_stock_analysis:v3.27.1}
  restart: unless-stopped
  env_file:
    - ../.env
  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    - ../longbridge_tokens:/home/dsa/.longbridge
  environment:
    - TZ=Asia/Shanghai
    - WEBUI_HOST=0.0.0.0
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  server:
    <<: *common
    container_name: stock-server
    network_mode: host
    command: python main.py --serve-only --host 0.0.0.0 --port ${API_PORT:-8088}

  telegram-bot:
    <<: *common
    container_name: dsa-telegram-bot
    network_mode: host
    command: python bot/telegram_polling.py
