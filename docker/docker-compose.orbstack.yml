name: daily-stock-analysis-orbstack

# ============================================================
# OrbStack 本地预发布环境
#
# 严格隔离约束（与生产 docker-compose.yml / docker-compose.server-image.yml 完全独立）：
# - 不启动 telegram-bot 服务（避免与生产 Bot 同一 Token 多实例冲突）。
# - 不启动 cloudflared、不挂载任何 SSH 反向隧道配置。
# - 禁用定时任务、自动分析、推送通知：scheduler / WebUI 调度器都不会被接管。
# - 仅绑定 127.0.0.1，避免误暴露到局域网。
# - restart: no — 本机手动 up/down，不会因 Docker daemon 自启而意外拉起。
# - 所有数据、日志、报告落到 .orbstack/，与生产 data/ logs/ reports/ 完全隔离。
#
# 与生产 compose 共用同一份源码构建，但容器名、端口、数据目录、命令都不同。
# ============================================================

# 公共锚点：所有服务都 <<: *orbstack-common，确保以下字段在最终 compose config
# 中确实展开到两个服务（通过 `docker compose config` 校验）：
#   restart: "no"
#   init: true
#   logging 限制（json-file，max-size=10m，max-file=3）
# 注：Compose 5.x 不会从 YAML 锚点合并 env_file 到服务定义，所以 env_file
# 在每个服务里显式声明，与锚点保持一致。
x-orbstack-common: &orbstack-common
  restart: "no"
  init: true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"
  # 只用本地占位 env 文件；缺失真实 Key 时允许启动 UI 与 healthcheck。
  env_file:
    - ../.env.orbstack.local

services:
  # ----------------------------------------------------------
  # DSA 本地预发布：源码构建原生 arm64 镜像（与生产 Dockerfile 共用）
  # ----------------------------------------------------------
  dsa-local:
    <<: *orbstack-common
    build:
      context: ..
      dockerfile: docker/Dockerfile
      # OrbStack 在 Apple Silicon 上是 arm64 Linux VM，原生构建无需交叉编译。
      # 注释保留此声明，让后续切换 buildx / linux/amd64 时一眼能看到。
      # platforms:
      #   - linux/arm64
    image: dsa-local:orbstack
    container_name: dsa-local
    # 显式声明 env_file（Compose 5.x 不从锚点合并 env_file）。
    env_file:
      - ../.env.orbstack.local
    # 完全跑在 Linux bridge 上，不使用 network_mode: host。
    # OpenD 在生产里走 host loopback + SSH 反向隧道；本机由 Mac 原生 OpenD 提供，
    # 预发布阶段不连接 OpenD（启动时 --no-notify，且本 compose 不暴露 quote 端口）。
    ports:
      - "127.0.0.1:18088:8088"
    volumes:
      - ../.orbstack/dsa/data:/app/data
      - ../.orbstack/dsa/logs:/app/logs
      - ../.orbstack/dsa/reports:/app/reports
      # strategies 是只读参考，不放本地覆盖。
      - ../strategies:/app/strategies:ro
    environment:
      - TZ=Asia/Shanghai
      - WEBUI_HOST=0.0.0.0
      - API_PORT=8088
      # 本地预发布显式关闭定时与推送：仅 serve-only，不接管 scheduler，不推送通知。
      - DSA_DISABLE_SCHEDULER=1
      - DSA_DISABLE_NOTIFY=1
    command:
      - python
      - main.py
      - --serve-only
      - --host
      - 0.0.0.0
      - --port
      - "8088"
      - --no-notify
    # 严格只接受 /api/health 的 2xx 响应；连接失败或 4xx/5xx 必须非零退出。
    # 严禁 || exit 0 等掩盖故障的写法。
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:8088/api/health | grep -Eq '^2[0-9]{2}$$'
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ----------------------------------------------------------
  # ER Dashboard 本地预发布（完整不可变镜像）
  # ----------------------------------------------------------
  er-local:
    <<: *orbstack-common
    build:
      context: ..
      dockerfile: ops/er-dashboard/Dockerfile
    image: er-dashboard-local:orbstack
    container_name: er-dashboard-local
    # 显式声明 env_file（Compose 5.x 不从锚点合并 env_file）。
    env_file:
      - ../.env.orbstack.local
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      # 只挂运行时数据：dashboard 输出、job 元数据、access log、本地配置文件。
      # 不再挂载任何宿主源码，源码全部 COPY 进镜像（完整不可变）。
      - ../.orbstack/er/dashboards:/opt/er-dashboards
      - ../.orbstack/er/logs:/opt/er-dashboard/logs
      - ../.orbstack/er/jobs:/opt/er-dashboard/jobs
      # 本地 ER 配置文件路径由 trigger.py 的 ER_ENV_PATH 控制（默认 /opt/dsa/.env），
      # 这里挂到 /opt/er-dashboard/.env.local，只读，避免覆盖生产默认值。
      - ../.env.orbstack.local:/opt/er-dashboard/.env.local:ro
    environment:
      - TZ=Asia/Shanghai
      - ER_HOST=0.0.0.0
      - ER_PORT=8080
      - ER_DASHBOARD_DIR=/opt/er-dashboards
      - ER_LOG_FILE=/opt/er-dashboard/logs/access.log
      - ER_JOB_LOG_FILE=/opt/er-dashboard/logs/jobs.log
      - ER_TRIGGER_SCRIPT=/opt/er-dashboard/trigger.py
      - ER_TRIGGER_CWD=/opt/er-dashboard
      - ER_DSA_URL=http://127.0.0.1:18088/
      # 本地覆盖 trigger.py 的 DSA_ENV_PATH；默认仍是 /opt/dsa/.env，
      # 生产行为完全不变。
      - ER_ENV_PATH=/opt/er-dashboard/.env.local
    # 严格 2xx 才算健康，失败必须非零退出，不允许任何兜底。
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/ | grep -Eq '^2[0-9]{2}$$'
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3